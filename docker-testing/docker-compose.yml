services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: verify_auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d verify_auth"]
      interval: 1s
      timeout: 5s
      retries: 30

  migrate:
    build:
      context: ..
      dockerfile: docker-testing/Dockerfile
    command: ["/app/migrate"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: verify_auth
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: docker-testing/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
